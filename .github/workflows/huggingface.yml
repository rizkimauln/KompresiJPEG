name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  # Memungkinkan kita menjalankan workflow secara manual dari tab Actions
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://rizkimauln:$HF_TOKEN@huggingface.co/spaces/rizkimauln/kompresijpegservice main
