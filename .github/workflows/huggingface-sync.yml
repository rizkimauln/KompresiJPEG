name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]

  # Menjalankan sinkronisasi secara manual
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir hf_deploy
          cp app.py hf_deploy/
          cp requirements.txt hf_deploy/
          cp Dockerfile hf_deploy/
          cp README.md hf_deploy/
          cd hf_deploy
          git init
          git checkout -b main
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add .
          git commit -m "Auto-deploy from GitHub Actions"
          git push https://rizkimauln:$HF_TOKEN@huggingface.co/spaces/rizkimauln/kompresijpegservice main --force
